# Kernel-Ícaro (vmicaro)
# Copyright (c) 2026 Ícaro Teles da Silva (@icarotelesdasilva)

insmod all_video
insmod gfxterm
insmod png

# Mantém a tela bonita com a imagem no menu
set gfxmode=1024x768
set gfxpayload=text
terminal_output gfxterm

background_image /boot/grub/background.png

set timeout=5
set default=0

menuentry "vmicaro" {
    # Força o GRUB a voltar para o console de texto antes do boot
    terminal_output console
    # Limpa a memória VGA antiga da SeaBIOS
    clear
    
    multiboot /boot/vmicaro
    boot
}

